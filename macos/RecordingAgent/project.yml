name: RecordingAgent
options:
  bundleIdPrefix: com.shengji
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    exactVersion: 1.0.0
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: 1.0.0
    PRODUCT_NAME: "$(TARGET_NAME)"
    SDKROOT: macosx
    SWIFT_VERSION: "5.0"
targets:
  RecordingAgentCore:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/RecordingAgentCore
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengji.recording-agent.core
        SKIP_INSTALL: YES

  RecordingAgent:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/RecordingAgent
    dependencies:
      - target: RecordingAgentCore
      - package: ArgmaxOSS
        product: WhisperKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        INFOPLIST_FILE: Config/RecordingAgent-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.shengji.recording-agent

  RecordingAgentCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/RecordingAgentCoreTests
    dependencies:
      - target: RecordingAgentCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengji.recording-agent.tests

  RecordingAgentUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/RecordingAgentUITests
    dependencies:
      - target: RecordingAgent
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengji.recording-agent.uitests
        TEST_TARGET_NAME: RecordingAgent
schemes:
  RecordingAgent:
    build:
      targets:
        RecordingAgent: all
        RecordingAgentCoreTests: [test]
        RecordingAgentUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: RecordingAgentCoreTests
        - name: RecordingAgentUITests
          skipped: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
